name: Publish Docs

on:
  push:
    branches: ["main"]
    paths:
      - "docs/**"
      - ".github/workflows/deploy-docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  # GitHub Pages config for vocs.config.ts
  BASE_URL: "https://scenario-docs.langwatch.ai"

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@7f4fc3e22c37d6ff65e88745f38bd3157c663f7c # v4
        with:
          python-version: "3.12"
      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - name: Cache dependencies
        uses: actions/cache@6f8efc29b200d32929f49075959781ed54ec270c # v3
        with:
          path: |
            .venv
            ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('**/pyproject.toml', '**/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-
      - name: Install dependencies
        run: uv sync --frozen
        working-directory: python
      - name: Generate python docs
        run: make pdocs
        working-directory: python

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4
        with:
          # Pinned to 10.21.0 — 10.22+ promotes ignored build scripts to a
          # fatal error under --frozen-lockfile in CI, which breaks the
          # docs install (esbuild postinstall). Until docs is moved to
          # workspace mode where onlyBuiltDependencies is honored, pin.
          version: 10.21.0

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*
          cache: "pnpm"
          cache-dependency-path: "javascript/pnpm-lock.yaml"
      - name: Install javascript dependencies
        run: pnpm install --frozen-lockfile
        working-directory: javascript
      - name: Generate javascript docs
        run: pnpm run generate:api-reference
        working-directory: javascript

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*
          cache: "pnpm"
          cache-dependency-path: "docs/pnpm-lock.yaml"
      - name: Install dependencies
        # pnpm 10.22+ treats ignored build scripts as a fatal error under
        # --frozen-lockfile in CI. esbuild needs its postinstall to unpack
        # its prebuilt binary. Writing the approval to a local .npmrc is
        # picked up reliably across pnpm versions; the env-var equivalent
        # has inconsistent array-value handling.
        run: |
          echo "only-built-dependencies[]=esbuild" >> .npmrc
          pnpm install --frozen-lockfile
      - name: Build
        run: pnpm run build
      - name: Setup Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: "./docs/docs/dist"
          include-hidden-files: true
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
