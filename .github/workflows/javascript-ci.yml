name: javascript-ci

on:
  push:
    branches:
      - main
    paths:
      - "javascript/**"
      - ".github/workflows/javascript-ci.yml"
  pull_request:
    paths:
      - "javascript/**"
      - ".github/workflows/javascript-ci.yml"
  workflow_dispatch:

env:
  CI: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-checks:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    strategy:
      matrix:
        node-version: [24.x]

    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          version: 10.22.0

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache-dependency-path: "javascript/pnpm-lock.yaml"
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: javascript

      # Covers typecheck
      - name: Build
        run: pnpm build:all
        working-directory: javascript

      - name: Lint
        run: pnpm lint:all
        working-directory: javascript

      - name: Type check
        run: pnpm typecheck:all
        working-directory: javascript

      - name: Tests
        run: pnpm run test:ci
        working-directory: javascript

      # Examples — skipped for Dependabot PRs since they don't have access to repo secrets
      - name: Test (Examples)
        if: github.actor != 'dependabot[bot]'
        run: pnpm -F vitest-examples test
        env:
          LANGWATCH_API_KEY: ${{ secrets.LANGWATCH_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        working-directory: javascript
