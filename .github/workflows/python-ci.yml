name: python-ci

on:
  push:
    branches:
      - main
    paths:
      - "python/**"
      - ".github/workflows/python-ci.yml"
  pull_request:
    paths:
      - "python/**"
      - ".github/workflows/python-ci.yml"
  workflow_dispatch:

env:
  CI: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"] # Focus on primary version for performance

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@7f4fc3e22c37d6ff65e88745f38bd3157c663f7c # v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Cache dependencies
        uses: actions/cache@6f8efc29b200d32929f49075959781ed54ec270c # v3
        with:
          path: |
            .venv
            ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('**/pyproject.toml', '**/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install dependencies
        run: uv sync --frozen
        working-directory: python

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short
        working-directory: python

      - name: Type check
        run: uv run pyright .
        working-directory: python

      # Examples — skipped for Dependabot PRs since they don't have access to repo secrets
      - name: Test (Examples)
        if: github.actor != 'dependabot[bot]'
        run: uv run pytest examples/ -v --tb=short
        env:
          LANGWATCH_API_KEY: ${{ secrets.LANGWATCH_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        working-directory: python
