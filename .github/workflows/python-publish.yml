name: python-publish

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    if: |
      (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'python/')) ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
      - uses: actions/setup-python@7f4fc3e22c37d6ff65e88745f38bd3157c663f7c # v4
        with:
          python-version: "3.11"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          make install
          uv pip install build
        working-directory: python

      - name: Copy README.md
        run: |
          cp README.md python/README.md

      - name: Build package
        run: uv run python -m build
        working-directory: python

      # Sanity check.
      # `-m "not integration"` deselects voice e2e tests (auto-marked by
      # tests/voice/conftest.py). Those hit live providers, require API
      # key secrets we don't expose to the publish workflow, and run
      # nightly via voice-integration.yml. Mirrors python-ci.yml.
      - name: Run tests
        run: |
          uv run pytest tests -m "not integration"
        working-directory: python

      - name: Publish package
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
        with:
          packages-dir: python/dist/
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          attestations: false
