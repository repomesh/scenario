# Path-change gate for the "always-run + aggregator" pattern. See #364.
#
# On `pull_request` / `pull_request_target` we diff the PR against its
# base using dorny/paths-filter. On every other event (push, schedule,
# workflow_dispatch) we force every declared filter to `true` so the real
# jobs always run — required aggregator checks need a concrete result.
#
# The caller MUST check out the repo first so this composite action is
# accessible — dorny/paths-filter then reads the diff against the PR base.
#
# IMPORTANT: every filter key the caller wants to consume must be declared
# as an `outputs.<key>` entry below AND echoed into the force step.
# dorny/paths-filter sets per-key outputs internally, but a composite
# action only exposes outputs it explicitly declares — silently missing
# entries land as empty strings.
#
# Usage:
#   jobs:
#     changes:
#       runs-on: ubuntu-latest
#       outputs:
#         relevant: ${{ steps.detect.outputs.relevant }}
#       steps:
#         - uses: actions/checkout@...
#         - uses: ./.github/actions/detect-changes
#           id: detect
#           with:
#             filters: |
#               relevant:
#                 - 'python/**'
#                 - '.github/workflows/python-ci.yml'
name: detect-changes
description: Decide whether a path-filtered workflow should run real work.
inputs:
  filters:
    description: YAML filter block for dorny/paths-filter (must define `relevant` filter).
    required: true
outputs:
  relevant:
    description: "'true' if relevant paths changed, or if event is not a PR."
    value: ${{ steps.filter.outputs.relevant || steps.force.outputs.relevant }}

runs:
  using: composite
  steps:
    - name: Detect relevant changes
      if: github.event_name == 'pull_request' || github.event_name == 'pull_request_target'
      id: filter
      uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
      with:
        filters: ${{ inputs.filters }}

    - name: Force every filter true on non-PR events
      if: github.event_name != 'pull_request' && github.event_name != 'pull_request_target'
      id: force
      shell: bash
      run: |
        echo "relevant=true" >> "$GITHUB_OUTPUT"
