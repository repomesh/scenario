[pytest]
asyncio_default_fixture_loop_scope=function
# Fail any individual test hanging longer than 60s. The `thread` method
# is required for async tests — the default `signal` method uses SIGALRM
# which only interrupts the main thread and won't fire while the event
# loop is blocked inside a coroutine. Provided by pytest-timeout.
timeout = 60
timeout_method = thread
markers =
    integration: hits live providers / external services — requires API keys, run via the nightly voice-integration workflow, not on every PR.
